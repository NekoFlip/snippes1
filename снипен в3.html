<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Магазин Сниппетов</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent: #e91e63;
            --bg: #000;
            --card-bg: #111;
            --border: #2a2a2a;
            --text: #fff;
            --muted: #888;
            --gap: clamp(10px, 2vw, 20px);
            --radius: clamp(8px, 1.5vw, 14px);
            --pad-x: clamp(12px, 4vw, 40px);
            --pad-y: clamp(28px, 5vw, 60px);
        }

        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
            padding: var(--pad-y) var(--pad-x);
            padding-bottom: calc(var(--pad-y) + env(safe-area-inset-bottom));
            padding-left: calc(var(--pad-x) + env(safe-area-inset-left));
            padding-right: calc(var(--pad-x) + env(safe-area-inset-right));
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overscroll-behavior: none;
        }

        .container { max-width: 1400px; width: 100%; margin: 0 auto; }

        /* ── Секция ── */
        .section { margin-bottom: var(--pad-y); text-align: center; }

        .divider { border: none; border-top: 1px solid var(--border); margin: 0 0 var(--pad-y); }

        .section-title {
            font-size: clamp(14px, 2.5vw, 24px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: clamp(14px, 2vw, 20px);
        }

        /* ── Стрелки ── */
        .nav-arrows { display: flex; justify-content: center; gap: 10px; margin-bottom: clamp(18px, 3vw, 35px); }

        .arrow {
            width: clamp(28px, 4vw, 36px);
            height: clamp(28px, 4vw, 36px);
            background: var(--accent);
            border-radius: 50%;
            border: none;
            color: #fff;
            font-size: clamp(12px, 1.5vw, 16px);
            font-weight: bold;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s, transform 0.15s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .arrow:hover { opacity: 0.8; }
        .arrow:active { transform: scale(0.92); }

        /* ── Сетка ── */
        .grid {
            display: grid;
            gap: var(--gap);
            grid-template-columns: repeat(2, minmax(0, 320px)); /* мобиль: 2 чётных колонки */
            justify-content: center; /* центрирует всю сетку */
        }

        @media (min-width: 700px)  { .grid { grid-template-columns: repeat(4, minmax(0, 280px)); } }
        @media (min-width: 1280px) { .grid { grid-template-columns: repeat(4, minmax(0, 320px)); } }
        @media (min-width: 1600px) { .grid { grid-template-columns: repeat(6, minmax(0, 280px)); } }
        @media (min-width: 2000px) { .grid { grid-template-columns: repeat(8, minmax(0, 260px)); } }

        /* ── Карточка ── */
        .card { display: flex; flex-direction: column; text-align: left; width: 100%; }

        /* ── Превью (9:16) ── */
        .thumb {
            aspect-ratio: 9 / 16;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--card-bg);
            position: relative;
            margin-bottom: clamp(8px, 1.5vw, 14px);
            cursor: pointer;
            overflow: hidden;
            /* Подавляем 300ms задержку касания */
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.25s ease, border-color 0.25s ease;
            /* GPU-слой */
            will-change: transform;
        }

        /* Hover только на устройствах с мышью */
        @media (hover: hover) {
            .thumb:hover { transform: translateY(-5px); border-color: var(--accent); }
        }
        .thumb:active { transform: scale(0.97); }

        /* Обложка */
        .thumb img.cover { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* Видео */
        .thumb video {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            display: none;
        }
        .thumb.playing video { display: block; }
        .thumb.playing img.cover { visibility: hidden; }

        /* Оверлей плей / пауза */
        .play-overlay {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.0);
            opacity: 0;
            transition: opacity 0.3s ease, background 0.3s ease;
            pointer-events: none;
        }
        /* Показываем при hover (устройства с мышью) */
        @media (hover: hover) {
            .thumb:hover .play-overlay { opacity: 1; background: rgba(0,0,0,0.25); }
        }
        /* На тач-устройствах показываем всегда (управление через класс) */
        @media (hover: none) {
            .thumb .play-overlay { opacity: 1; }
        }
        /* Во время воспроизведения — управляем через .icon-hidden */
        .play-overlay.icon-hidden { opacity: 0 !important; }

        /* Круглая кнопка */
        .play-btn-circle {
            width: clamp(36px, 5vw, 52px);
            height: clamp(36px, 5vw, 52px);
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.8);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .play-icon {
            width: 0; height: 0;
            border-top: clamp(8px, 1.2vw, 12px) solid transparent;
            border-bottom: clamp(8px, 1.2vw, 12px) solid transparent;
            border-left: clamp(14px, 2vw, 20px) solid #fff;
            margin-left: 3px;
        }
        .pause-icon { display: none; gap: 4px; }
        .pause-icon span {
            width: clamp(3px, 0.5vw, 5px);
            height: clamp(12px, 2vw, 18px);
            background: #fff;
            border-radius: 2px;
        }
        .thumb.playing .play-icon { display: none; }
        .thumb.playing .pause-icon { display: flex; }

        /* Ник и трек */
        .track-info {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: clamp(20px, 3vw, 32px) clamp(8px, 1.5vw, 14px) clamp(8px, 1.2vw, 12px);
            background: linear-gradient(transparent, rgba(0,0,0,0.88));
            pointer-events: none;
        }
        .track-name {
            font-size: clamp(10px, 1.3vw, 13px);
            font-weight: 600; color: #fff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .track-nick {
            font-size: clamp(9px, 1.1vw, 12px);
            color: var(--accent); margin-top: 2px;
        }

        /* Бейдж «нет видео» */
        .no-video-badge {
            position: absolute; top: 8px; left: 8px;
            background: rgba(0,0,0,0.55);
            border-radius: 4px; padding: 2px 6px;
            font-size: clamp(8px, 1vw, 10px); color: var(--muted);
            pointer-events: none;
        }

        /* ── Текст карточки ── */
        .card-title {
            font-size: clamp(13px, 1.5vw, 16px);
            font-weight: 600; margin-bottom: 3px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .card-price {
            font-size: clamp(13px, 1.4vw, 15px);
            font-weight: 700; color: var(--accent);
            margin-bottom: clamp(8px, 1.2vw, 12px);
        }

        /* ── Кнопка BUY ── */
        .buy-btn {
            background: #222; color: #fff;
            border: none;
            padding: clamp(5px, 0.8vw, 8px) clamp(12px, 1.8vw, 18px);
            font-size: clamp(10px, 1.1vw, 12px);
            font-weight: 700; border-radius: 4px;
            cursor: pointer; text-transform: uppercase;
            letter-spacing: 0.05em;
            width: 100%;
            transition: background 0.2s, transform 0.15s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .buy-btn:hover { background: var(--accent); }
        .buy-btn:active { transform: scale(0.96); }

        /* ── Маленькие телефоны (< 360px) ── */
        @media (max-width: 359px) {
            .grid { grid-template-columns: 1fr; }
        }

        /* ── Большие экраны (4K+) ── */
        @media (min-width: 2000px) {
            .grid { grid-template-columns: repeat(8, 1fr); }
        }

        /* ── Landscape на телефонах ── */
        @media (max-height: 500px) and (orientation: landscape) {
            body { padding-top: 16px; padding-bottom: 16px; }
            .section { margin-bottom: 24px; }
            .section-title { margin-bottom: 10px; }
            .nav-arrows { margin-bottom: 12px; }
        }

        /* ── Уважаем prefers-reduced-motion ── */
        @media (prefers-reduced-motion: reduce) {
            .thumb, .buy-btn, .arrow { transition: none; }
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
// =============================================
//   НАСТРОЙКИ — меняй только здесь
// =============================================

const sections = [
    {
        title: 'Обычные сниппеты',
        items: [
            {
                title: 'Сниппет тес 1',
                price: 'проверка цена 1 ₽',
                nick: '@Имя тест',        // ник автора
                track: 'Название трека тест',  // название трека
                cover: 'images/1.jpg',                  // путь к обложке: 'images/cover1.jpg'
                video: 'videos/1.mp4'                   // путь к видео:   'videos/snip1.mp4'
            },
            {
                title: 'Сниппет проверка',
                price: '123123₽',
                nick: '@prod_alexey',
                track: 'Summer Trap 808',
                cover: 'images/2.jpg',
                video: 'videos/2.mp4'
            },
            {
                title: 'Сниппет #3',
                price: '456256₽',
                nick: '@beatmaker_ru',
                track: 'Lo-Fi Study',
                cover: 'images/3.jpg',
                video: 'videos/3.mp4'
            },
            {
                title: 'Сниппет #4',
                price: '900₽',
                nick: '@sound_lab',
                track: 'Dark Club Mix',
                cover: '',
                video: ''
            },
        ]
    },
    {
        title: 'Премиум сниппеты',
        items: [
            {
                title: 'Сниппет #5',
                price: '1600₽',
                nick: '@vip_beats',
                track: 'Platinum Wave',
                cover: '',
                video: ''
            },
            {
                title: 'Сниппет #6',
                price: '1600₽',
                nick: '@elite_prod',
                track: 'Gold Rush Drill',
                cover: '',
                video: ''
            },
            {
                title: 'Сниппет #7',
                price: '1600₽',
                nick: '@topline_ru',
                track: 'Cinematic Keys',
                cover: '',
                video: ''
            },
            {
                title: 'Сниппет #8',
                price: '1600₽',
                nick: '@future_waves',
                track: 'Euphoria Drop',
                cover: '',
                video: ''
            },
        ]
    }
];

// =============================================
//   РЕНДЕР — не нужно трогать
// =============================================

let currentlyPlaying = null;
const hideTimers = {};

function scheduleHide(id) {
    clearTimeout(hideTimers[id]);
    hideTimers[id] = setTimeout(() => {
        const thumb = document.getElementById(id);
        if (thumb && thumb.classList.contains('playing')) {
            const overlay = thumb.querySelector('.play-overlay');
            if (overlay) overlay.classList.add('icon-hidden');
        }
    }, 3000);
}

function showOverlay(id) {
    clearTimeout(hideTimers[id]);
    const thumb = document.getElementById(id);
    if (thumb) {
        const overlay = thumb.querySelector('.play-overlay');
        if (overlay) overlay.classList.remove('icon-hidden');
    }
}

function buildCard(item, index) {
    const id = 'card-' + index;
    const hasCover = item.cover && item.cover.trim() !== '';
    const hasVideo = item.video && item.video.trim() !== '';

    const thumbEl = document.createElement('div');
    thumbEl.className = 'thumb';
    thumbEl.id = id;

    if (hasCover) {
        const img = document.createElement('img');
        img.className = 'cover';
        img.src = item.cover;
        img.alt = item.track;
        img.loading = 'lazy';
        img.decoding = 'async';
        thumbEl.appendChild(img);
    } else {
        thumbEl.style.background = 'linear-gradient(135deg, #2c2c2c 0%, #111 100%)';
    }

    if (hasVideo) {
        const vid = document.createElement('video');
        vid.src = item.video;
        vid.loop = false;
        vid.playsInline = true;
        vid.setAttribute('webkit-playsinline', '');
        vid.preload = 'none';
        vid.muted = false;
        vid.addEventListener('ended', () => {
            vid.currentTime = 0;
            vid.pause();
            const thumb = document.getElementById(id);
            if (thumb) thumb.classList.remove('playing');
            showOverlay(id);
            currentlyPlaying = null;
        });
        thumbEl.appendChild(vid);
        thumbEl.addEventListener('click', () => togglePlay(id));
    } else {
        const badge = document.createElement('div');
        badge.className = 'no-video-badge';
        badge.textContent = 'нет видео';
        thumbEl.appendChild(badge);
    }

    if (hasVideo) {
        const overlay = document.createElement('div');
        overlay.className = 'play-overlay';
        overlay.innerHTML = '<div class="play-btn-circle"><div class="play-icon"></div><div class="pause-icon"><span></span><span></span></div></div>';
        thumbEl.appendChild(overlay);
    }

    const info = document.createElement('div');
    info.className = 'track-info';
    info.innerHTML = `<div class="track-name">${item.track}</div><div class="track-nick">${item.nick}</div>`;
    thumbEl.appendChild(info);

    const card = document.createElement('div');
    card.className = 'card';
    card.appendChild(thumbEl);

    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = item.title;

    const price = document.createElement('div');
    price.className = 'card-price';
    price.textContent = item.price;

    const btn = document.createElement('button');
    btn.className = 'buy-btn';
    btn.textContent = 'BUY';

    card.appendChild(title);
    card.appendChild(price);
    card.appendChild(btn);

    return card;
}

function togglePlay(id) {
    const thumb = document.getElementById(id);
    const vid = thumb.querySelector('video');
    if (!vid) return;

    // Останавливаем предыдущее
    if (currentlyPlaying && currentlyPlaying !== id) {
        const prev = document.getElementById(currentlyPlaying);
        if (prev) {
            const prevVid = prev.querySelector('video');
            if (prevVid) prevVid.pause();
            prev.classList.remove('playing');
            showOverlay(currentlyPlaying);
            clearTimeout(hideTimers[currentlyPlaying]);
        }
    }

    if (thumb.classList.contains('playing')) {
        // Пауза — показываем кнопку обратно
        vid.pause();
        thumb.classList.remove('playing');
        showOverlay(id);
        clearTimeout(hideTimers[id]);
        currentlyPlaying = null;
    } else {
        // Плей — показываем кнопку, через 3 сек прячем
        vid.play().catch(() => {});
        thumb.classList.add('playing');
        showOverlay(id);
        scheduleHide(id);
        currentlyPlaying = id;
    }
}

function render() {
    const app = document.getElementById('app');
    let cardIndex = 0;

    sections.forEach((section, si) => {
        if (si > 0) {
            const hr = document.createElement('hr');
            hr.className = 'divider';
            app.appendChild(hr);
        }

        const sec = document.createElement('section');
        sec.className = 'section';

        const h2 = document.createElement('h2');
        h2.className = 'section-title';
        h2.textContent = section.title;

        const arrows = document.createElement('div');
        arrows.className = 'nav-arrows';
        arrows.innerHTML = '<button class="arrow" aria-label="Назад">&lt;</button><button class="arrow" aria-label="Вперёд">&gt;</button>';

        const grid = document.createElement('div');
        grid.className = 'grid';

        section.items.forEach(item => {
            grid.appendChild(buildCard(item, cardIndex++));
        });

        sec.appendChild(h2);
        sec.appendChild(arrows);
        sec.appendChild(grid);
        app.appendChild(sec);
    });
}

render();
</script>
</body>
</html>
